services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ${WORKSPACE_DIR:-./repos}:/data/repos
    depends_on:
      - redis
      - db
    command: uvicorn devagent.app:create_app --factory --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    volumes:
      - ${WORKSPACE_DIR:-./repos}:/data/repos
    depends_on:
      - redis
      - db

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      - redis
    command: celery -A devagent.workers.celery_app:celery_app beat --loglevel=${APP_LOG_LEVEL:-INFO}

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devagent
      POSTGRES_USER: devagent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devagent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  redis-data:
  pgdata:
