services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      # Override paths for container (host dirs mounted at /data/*)
      WORKSPACE_DIR: /data/repos
      LOG_DIR: /data/logs
      ATTACHMENTS_DIR: /data/attachments
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./dev_data/repos:/data/repos
      - ./dev_data/logs:/data/logs
      - ./dev_data/attachments:/data/attachments
    depends_on:
      - redis
      - db
    command: uvicorn devagent.app:create_app --factory --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      WORKSPACE_DIR: /data/repos
      LOG_DIR: /data/logs
      ATTACHMENTS_DIR: /data/attachments
    volumes:
      - ./dev_data/repos:/data/repos
      - ./dev_data/logs:/data/logs
      - ./dev_data/attachments:/data/attachments
    depends_on:
      - redis
      - db

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      - redis
    command: celery -A devagent.workers.celery_app:celery_app beat --loglevel=${APP_LOG_LEVEL:-INFO}

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "3000:3000"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./dev_data/redis:/data

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devagent
      POSTGRES_USER: devagent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devagent}
    ports:
      - "5432:5432"
    volumes:
      - ./dev_data/db/postgres:/var/lib/postgresql/data
